name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finboard
          POSTGRES_PASSWORD: finboard_pass
          POSTGRES_DB: finboard_banking_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (banking-service)
        run: pnpm --filter @finboard/banking-service exec prisma generate

      - name: Run Prisma migrations (banking-service test DB)
        run: pnpm --filter @finboard/banking-service exec prisma migrate deploy
        env:
          BANK_DATABASE_URL: postgresql://finboard:finboard_pass@localhost:5432/finboard_banking_test

      - name: Lint (turbo — all packages in parallel)
        run: pnpm turbo run lint

      - name: Test (turbo — respects workspace dependency order)
        run: pnpm turbo run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (banking-service)
        run: pnpm --filter @finboard/banking-service exec prisma generate

      - name: Build all packages and apps (turbo)
        run: pnpm turbo run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          API_GATEWAY_URL: http://localhost:4000
